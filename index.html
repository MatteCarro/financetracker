<!doctype html>
<html lang="it" data-theme="light">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport ── -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />

    <!-- ── PWA / iOS meta ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Finance" />
    <meta name="application-name" content="FinanceTracker" />
    <meta name="theme-color" content="#fef6fb" />

    <!-- ── Description / SEO ── -->
    <meta
      name="description"
      content="Il tuo tracker finanziario personale — locale, sicuro, offline."
    />

    <!-- ── Icons ── -->
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="mask-icon" href="/icons/mask-icon.svg" color="#6366f1" />

    <!-- ── iOS Splash screens ── -->
    <!-- iPhone 15 Pro Max -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
      href="/splash/splash-430x932.png"
    />
    <!-- iPhone 15 / 14 Pro -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)"
      href="/splash/splash-393x852.png"
    />
    <!-- iPhone SE -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)"
      href="/splash/splash-375x667.png"
    />
    <!-- iPad Pro 12.9 -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)"
      href="/splash/splash-1024x1366.png"
    />

    <!-- ── Content Security Policy ── -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: blob:;
        font-src 'self';
        connect-src 'self';
        worker-src 'self' blob:;
        manifest-src 'self';
        frame-ancestors 'none';
      "
    />

    <title>FinanceTracker</title>

    <!-- ── Theme flash prevention — runs before React ── -->
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem('ft-theme')
          // Default to the cute light theme; only switch to dark if explicitly chosen
          var theme = stored === 'dark' ? 'dark' : 'light'
          document.documentElement.setAttribute('data-theme', theme)
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
